# java/.tmux-init.conf
# Force-restart the 'editor' window
tmux respawn-window -k -t "$SESSION:editor" "exec $bash_path"

# Start devenv shell (this boots the PG 18 service in the background)
tmux send-keys -t "$SESSION:editor" "devenv shell" C-m
# Give the JDK and Postgres an extra moment to initialize
sleep 2
tmux send-keys -t "$SESSION:editor" "nvim-java" C-m

# Force-restart 'console' window
tmux respawn-window -k -t "$SESSION:console" "exec $bash_path"
tmux send-keys -t "$SESSION:console" "devenv shell" C-m
sleep 1
tmux send-keys -t "$SESSION:console" "clear" C-m

# This creates a new window specifically for pgcli
tmux new-window -t "$SESSION" -n "database" -c "$selected_path" "exec $bash_path"
tmux send-keys -t "$SESSION:database" "devenv shell" C-m
sleep 1.5
# Automatically connect to the database created in devenv.nix
tmux send-keys -t "$SESSION:database" "pgcli $database_name" C-m

# Focus the editor
tmux select-window -t "$SESSION:editor"
