# rust/.tmux-init.conf

# Force-restart the 'editor' window to a clean bash state (killing nvim-web)
tmux respawn-window -k -t "$SESSION:editor" "exec $bash_path"

# Send the commands to start devenv, wait a second for it to load, then open VS Code
tmux send-keys -t "$SESSION:editor" "devenv shell" C-m
sleep 1
tmux send-keys -t "$SESSION:editor" "nvim-rust" C-m

# Force-restart the 'console' window to automatically drop into devenv shell
tmux respawn-window -k -t "$SESSION:console" "exec $bash_path"
tmux send-keys -t "$SESSION:console" "devenv shell" C-m

# Focus the editor window
tmux select-window -t "$SESSION:editor"

